# =============================================================================
# EXTRACTION RULES & THRESHOLDS
# Document Intelligence Refinery - Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Strategy Selection Thresholds
# -----------------------------------------------------------------------------
strategy_selection:
  # Strategy A: Fast Text (pdfplumber)
  strategy_a:
    min_char_count: 100          # Min characters per page
    max_image_ratio: 0.50        # Max image area / page area
    min_char_density: 0.01       # Min chars / page area (points²)
    requires_font_meta: false    # Font metadata helpful but not required
    
  # Strategy B: Layout-Aware (Docling)
  strategy_b:
    trigger_multi_column: true   # Use for multi-column layouts
    trigger_table_heavy: true    # Use when tables detected
    trigger_mixed_origin: true   # Use for mixed digital/scanned
    
  # Strategy C: Vision/OCR (VLM)
  strategy_c:
    trigger_scanned: true        # Use for scanned_image origin
    trigger_low_confidence: true # Use when A/B confidence < threshold
    trigger_handwriting: true    # Use when handwriting detected

# -----------------------------------------------------------------------------
# Confidence Thresholds
# -----------------------------------------------------------------------------
confidence:
  strategy_a_threshold: 0.85     # Below this → escalate to B
  strategy_b_threshold: 0.75     # Below this → escalate to C
  strategy_c_threshold: 0.70     # Below this → flag for review
  
# -----------------------------------------------------------------------------
# Budget Guards
# -----------------------------------------------------------------------------
budget:
  max_cost_per_document: 0.50    # USD - never exceed this
  strategy_a_cost_per_page: 0.00 # Free (local extraction)
  strategy_b_cost_per_page: 0.00 # Free (local Docling)
  strategy_c_cost_per_page: 0.002 # Paid (VLM API)

# -----------------------------------------------------------------------------
# Semantic Chunking Rules (The Constitution)
# -----------------------------------------------------------------------------
chunking:
  rule_1: "Table cells never split from headers"
  rule_2: "Figure captions stored as metadata"
  rule_3: "Numbered lists kept as single LDU"
  rule_4: "Section headers as parent metadata"
  rule_5: "Cross-references resolved"
  
  max_chunk_size: 512            # Max tokens per chunk
  overlap: 50                    # Token overlap between chunks

# -----------------------------------------------------------------------------
# Document Classification Rules
# -----------------------------------------------------------------------------
classification:
  origin_type:
    scanned_image:
      max_char_density: 0.01
      min_image_ratio: 0.50
    native_digital:
      min_char_density: 0.10
      max_image_ratio: 0.30
    mixed:
      char_density_range: [0.01, 0.10]
      
  layout_complexity:
    single_column:
      max_columns: 1
      max_tables: 2
    multi_column:
      min_columns: 2
    table_heavy:
      min_tables: 3
    figure_heavy:
      min_figures: 5

# -----------------------------------------------------------------------------
# Provenance Requirements
# -----------------------------------------------------------------------------
provenance:
  required_fields:
    - document_name
    - page_number
    - bounding_box
    - content_hash
  bbox_format: "[x0, y0, x1, y1]"
  hash_algorithm: "sha256"
  hash_length: 16                # First 16 chars of hash